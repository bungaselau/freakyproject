<form action="salvar_fornecedor.php" method="post">
    <h3>Dados do Fornecedor</h3>
    Nome: <input type="text" name="nome" required><br>
    CNPJ: <input type="text" name="cnpj" required><br>
    Telefone: <input type="text" name="telefone"><br>

    <h3>Endereco</h3>
    Rua: <input type="text" name="rua" required><br>
    Numero: <input type="number" name="numero" required><br>
    Bairro: <input type="text" name="bairro" required><br>
    Cidade: <input type="text" name="cidade" required><br>
    Estado: <input type="text" name="estado" maxlength="2" required><br>
    CEP: <input type="text" name="cep" required><br>
    Complemento: <input type="text" name="complemento"><br>

    <input type="submit" value="Cadastrar Fornecedor">
</form>
