<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Fornecedor</title>

<script>
    function verificarTipo() {
        var tipo = document.getElementById("tipo_moradia").value;
        var campoApartamento = document.getElementById("campo_apartamento");
    
        if (tipo === "apartamento") {
            campoApartamento.style.display = "block";
        } else {
            campoApartamento.style.display = "none";
        }
    }
    </script>
</head>
<body>

<h2>Cadastro de Fornecedor</h2>

    

<form action="salvar_fornecedor.php" method="POST">

    Nome:<br>
    <input type="text" name="nome" required><br><br>

    CNPJ:<br>
    <input type="text" name="cnpj" maxlength="14" pattern="[0-9]{14}" title="Digite apenas números (14 dígitos)" placeholder="Somente números" required><br><br>

    Telefone:<br>
    <input type="text" name="telefone" maxlength="11" pattern="[0-9]{10,11}" title="Digite apenas números (10 ou 11 dígitos)" placeholder="Somente números" required><br><br>

    <h3>Endereço</h3>

    Rua:<br>
    <input type="text" name="rua" required><br><br>

    Número:<br>
    <input type="text" name="numero" pattern="[0-9]+" title="Digite apenas números" placeholder="Somente números" required><br><br>

    Bairro:<br>
    <input type="text" name="bairro" required><br><br>

    Cidade:<br>
    <input type="text" name="cidade" required><br><br>

    Estado:<br>
    <input type="text" name="estado" maxlength="2" required><br><br>

    CEP:<br>
    <input type="text" name="cep" maxlength="8" pattern="[0-9]{8}" title="Digite apenas números (8 dígitos)" placeholder="Somente números" required><br><br>

 <!-- NOVO CAMPO -->
 Tipo de moradia:<br>
 <select name="tipo_moradia" id="tipo_moradia" onchange="verificarTipo()" required>
     <option value="">Selecione</option>
     <option value="casa">Casa</option>
     <option value="apartamento">Apartamento</option>
 </select><br><br>

    
   <!-- CAMPOS QUE APARECEM SÓ SE FOR AP -->
   <div id="campo_apartamento" style="display:none;">
    complemento:<br>
    <input type="text" name="complemento"><br><br>

    <!-- <input type="submit" value="Cadastrar Fornecedor"> -->
    </div>
    <input type="submit" value="Cadastrar Fornecedor">
    </form>

</body>
</html>
